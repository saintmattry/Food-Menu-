<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Come Again Restaurant</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./index.css">
</head>
<body>

  <section class="menu">

    <div class="header">
      <img src="./Images/Logo.png" alt="Logo">
      <h1>COME AGAIN</h1>
      <p>Delicious Meals Made With Love</p>
    </div>

    <div class="menu-grid">

      <!-- Rice -->
      <div class="card">
        <img src="./Images/Rice Dish.png" alt="A Picture of Rice">
        <h2>Rice Dishes</h2>

        <div class="food-item">
          <span>Jollof Rice</span>
          <span>₦2,500</span>
        </div>

        <div class="food-item">
          <span>Fried Rice</span>
          <span>₦3,400</span>
        </div>

        <div class="food-item">
          <span>Coconut Rice</span>
          <span>₦2,400</span>
        </div>

        <div class="food-item">
          <span>White Rice</span>
          <span>₦5,500</span>
        </div>

      </div>

      <!-- Soup -->

      <div class="card">
        <img src="./Images/Soup.png" alt="A Picture of Soup">

        <h2>Soups</h2>

        <div class="food-item">
          <span>Egusi Soup</span>
          <span>₦7,500</span>
        </div>

        <div class="food-item">
          <span>Vegetable Soup</span>
          <span>₦3,900</span>
        </div>

        <div class="food-item">
          <span>Afiedu</span>
          <span>₦2,600</span>
        </div>

        <div class="food-item">
          <span>Ewang Soup</span>
          <span>₦3,900</span>
        </div>

        <div class="food-item">
          <span>Pepper Soup</span>
          <span>₦2,500</span>
        </div>

      </div>

      <!-- Swallow -->

      <div class="card">
        <img src="./Images/Swallow.png" alt="">

        <h2>Swallows</h2>

        <div class="food-item">
          <span>Pounded Yam</span>
          <span>₦3,400</span>
        </div>

        <div class="food-item">
          <span>Fufu</span>
          <span>₦2,400</span>
        </div>

        <div class="food-item">
          <span>Eba</span>
          <span>₦1,800</span>
        </div>

        <div class="food-item">
          <span>Wheat</span>
          <span>₦2,000</span>
        </div>

      </div>

    </div>

  </section>

  <script src="./index.js"></script>

</body>
</html>
